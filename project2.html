<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Access | Registration</title>
    <link rel="stylesheet" href="project2.css">
</head>
<body>

    <div class="form-container">
        <h2>System Registration</h2>
        <p>Complete the fields below to initialize your account.</p>

        <form action="/submit-path" method="POST">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" 
                       placeholder="e.g., admin_root" required minlength="4">
            </div>

            <div class="input-group">
                <label for="email">Network Email</label>
                <input type="email" id="email" name="email" 
                       placeholder="user@network.com" required>
            </div>

            <div class="input-group">
                <label for="password">Security Key (Password)</label>
                <input type="password" id="password" name="password" 
                       required minlength="8" 
                       pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                       title="Must contain at least one number, one uppercase, and one lowercase letter.">
            </div>

            <div class="input-group">
                <label for="access-level">Requested Access Level (1-10)</label>
                <input type="number" id="access-level" name="access-level" 
                       min="1" max="10" value="1">
            </div>

            <button type="submit" class="btn-submit">Initialize Account</button>
        </form>
    </div>

</body>
</html>
